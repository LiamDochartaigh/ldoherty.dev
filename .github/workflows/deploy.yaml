name: Deploy to Pi
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PI_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "Host ${{ secrets.PI_HOST }}" >> ~/.ssh/config
          echo "  ProxyCommand cloudflared access ssh --hostname %h" >> ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Deploy
        run: |
          ssh ${{ secrets.PI_USER }}@${{ secrets.PI_HOST }} '
            cd $PI_SOURCE_DIR
            git pull origin main
            npm install
            npm run build
            rm -rf $PI_PUBLIC_HTML/*
            cp -r dist/* $PI_PUBLIC_HTML/
          '
        env:
          PI_SOURCE_DIR: ${{ secrets.PI_SOURCE_DIR }}
          PI_PUBLIC_HTML: ${{ secrets.PI_PUBLIC_HTML }}